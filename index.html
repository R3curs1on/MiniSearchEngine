<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniSearch</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #F7F5F0;
    --surface:  #FFFFFF;
    --ink:      #1A1916;
    --muted:    #6B6860;
    --accent:   #C9472B;
    --border:   rgba(26,25,22,0.1);
    --mark-bg:  #FDE68A;
    --mark-ink: #78350F;
    --radius:   6px;
    --mono:     "DM Sans", sans-serif;
    --serif:    "DM Serif Display", serif;
  }

  body {
    font-family: var(--mono);
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── Hero / Search Bar ── */
  #hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    transition: min-height 0.4s ease;
  }
  #hero.shrunk {
    min-height: 0;
    padding: 2rem 2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--serif);
    font-size: clamp(3rem, 8vw, 5.5rem);
    color: var(--ink);
    letter-spacing: -0.03em;
    margin-bottom: 2.5rem;
    transition: font-size 0.3s ease, margin 0.3s ease;
  }
  .logo span { color: var(--accent); }
  #hero.shrunk .logo { font-size: 1.6rem; margin-bottom: 0; margin-right: 1.5rem; }
  #hero.shrunk #search-row { flex-direction: row; align-items: center; width: auto; max-width: none; }

  #search-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 620px;
    gap: 0;
  }

  #search-wrap {
    display: flex;
    width: 100%;
    position: relative;
  }

  #q {
    width: 100%;
    padding: 14px 52px 14px 20px;
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 400;
    border: 1.5px solid var(--border);
    border-radius: 40px;
    background: var(--surface);
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #q:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(201,71,43,0.1);
  }
  #hero.shrunk #q { font-size: 15px; padding: 10px 44px 10px 16px; min-width: 360px; }

  #btn-search {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--accent); color: white;
    border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, transform 0.15s;
  }
  #btn-search:hover { background: #a8391f; transform: translateY(-50%) scale(1.05); }
  #btn-search svg { width: 16px; height: 16px; }

  /* Autocomplete */
  #suggest-box {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: none;
    z-index: 200;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  }
  .suggest-item {
    padding: 10px 16px;
    font-size: 14px;
    cursor: pointer;
    color: var(--muted);
  }
  .suggest-item:hover { background: var(--bg); color: var(--ink); }

  /* ── Stats bar ── */
  #stats-bar {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    margin-top: 12px;
    display: none;
  }
  #stats-bar.visible { display: block; }

  /* ── Results area ── */
  #results-area {
    max-width: 720px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  #meta {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 1.5rem;
    display: none;
  }

  .result-card {
    padding: 1.25rem 0;
    border-bottom: 1px solid var(--border);
    animation: fadeUp 0.25s ease both;
  }
  .result-card:first-child { border-top: 1px solid var(--border); }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0);   }
  }

  .result-url {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .result-title {
    font-family: var(--serif);
    font-size: 19px;
    color: var(--accent);
    margin-bottom: 5px;
    line-height: 1.35;
  }
  .result-title a { text-decoration: none; color: inherit; }
  .result-title a:hover { text-decoration: underline; }
  .result-snippet {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.65;
  }
  .result-snippet mark {
    background: var(--mark-bg);
    color: var(--mark-ink);
    font-weight: 500;
    padding: 0 2px;
    border-radius: 2px;
  }
  .result-meta {
    display: flex; gap: 12px; margin-top: 6px;
    font-size: 11px; color: #AAA8A2;
  }
  .result-meta span { font-family: monospace; }

  /* ── Pagination ── */
  #pagination {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 2rem;
  }
  .page-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 13px;
    cursor: pointer;
    color: var(--ink);
    transition: all 0.15s;
  }
  .page-btn:hover  { border-color: var(--accent); color: var(--accent); }
  .page-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  /* ── Empty/loading states ── */
  #empty { display: none; text-align: center; padding: 4rem 0; }
  #empty .big { font-family: var(--serif); font-size: 3rem; color: var(--border); }
  #empty p { font-size: 14px; color: var(--muted); margin-top: 8px; }

  #loading { display: none; text-align: center; padding: 3rem; }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Index stats page ── */
  #index-stats { display: none; text-align: center; padding: 3rem 0; }
  .stat-grid { display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap; margin-top: 1.5rem; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem 2rem;
    min-width: 140px;
  }
  .stat-num { font-family: var(--serif); font-size: 2.5rem; color: var(--accent); }
  .stat-lbl { font-size: 12px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
</style>
</head>
<body>

<div id="hero">
  <div class="logo">Mini<span>Search</span></div>
  <div id="search-row">
    <div id="search-wrap">
      <input id="q" type="text" placeholder="Search the indexed web…" autocomplete="off" spellcheck="false" />
      <div id="suggest-box"></div>
      <button id="btn-search" aria-label="Search">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="8.5" cy="8.5" r="5.5"/><line x1="13" y1="13" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  </div>
  <div id="stats-bar"></div>
</div>

<div id="results-area">
  <div id="loading"><div class="spinner"></div></div>
  <div id="meta"></div>
  <div id="results-list"></div>
  <div id="empty">
    <div class="big">∅</div>
    <p>No results found. Try different keywords.</p>
  </div>
  <div id="pagination"></div>
  <div id="index-stats"></div>
</div>

<script>
const API = "http://localhost:3001";
let currentPage = 1;
let currentQuery = "";
let suggestTimer = null;

const qEl         = document.getElementById("q");
const heroEl      = document.getElementById("hero");
const metaEl      = document.getElementById("meta");
const listEl      = document.getElementById("results-list");
const loadingEl   = document.getElementById("loading");
const emptyEl     = document.getElementById("empty");
const paginEl     = document.getElementById("pagination");
const suggestBox  = document.getElementById("suggest-box");
const statsBar    = document.getElementById("stats-bar");
const indexStats  = document.getElementById("index-stats");

// ── Load index stats on initial page ─────────────────────────────────────────
async function loadStats() {
  try {
    const res  = await fetch(`${API}/stats`);
    const data = await res.json();
    statsBar.textContent =
      `${data.pages.toLocaleString()} pages · ${data.terms.toLocaleString()} terms · ${data.postings.toLocaleString()} postings indexed`;
    statsBar.classList.add("visible");

    indexStats.innerHTML = `
      <p style="font-size:13px;color:var(--muted);margin-bottom:0.5rem;">Index statistics</p>
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-num">${data.pages.toLocaleString()}</div><div class="stat-lbl">Pages</div></div>
        <div class="stat-card"><div class="stat-num">${data.terms.toLocaleString()}</div><div class="stat-lbl">Unique Terms</div></div>
        <div class="stat-card"><div class="stat-num">${data.postings.toLocaleString()}</div><div class="stat-lbl">Postings</div></div>
      </div>
    `;
  } catch { statsBar.textContent = "Connect the API to see stats"; statsBar.classList.add("visible"); }
}

// ── Autocomplete ──────────────────────────────────────────────────────────────
qEl.addEventListener("input", () => {
  clearTimeout(suggestTimer);
  const val = qEl.value.trim();
  if (val.length < 2) { suggestBox.style.display = "none"; return; }
  suggestTimer = setTimeout(async () => {
    try {
      const res   = await fetch(`${API}/suggest?q=${encodeURIComponent(val)}`);
      const terms = await res.json();
      if (!terms.length) { suggestBox.style.display = "none"; return; }
      suggestBox.innerHTML = terms.map(t =>
        `<div class="suggest-item" onclick="pickSuggest('${t}')">${t}</div>`
      ).join("");
      suggestBox.style.display = "block";
    } catch { suggestBox.style.display = "none"; }
  }, 200);
});

function pickSuggest(term) {
  qEl.value = term;
  suggestBox.style.display = "none";
  doSearch(term, 1);
}

document.addEventListener("click", e => {
  if (!suggestBox.contains(e.target) && e.target !== qEl) suggestBox.style.display = "none";
});

// ── Search ────────────────────────────────────────────────────────────────────
document.getElementById("btn-search").addEventListener("click", () => {
  doSearch(qEl.value.trim(), 1);
});
qEl.addEventListener("keydown", e => {
  if (e.key === "Enter") doSearch(qEl.value.trim(), 1);
});

async function doSearch(query, page) {
  if (!query) return;
  currentQuery = query;
  currentPage  = page;
  suggestBox.style.display = "none";

  heroEl.classList.add("shrunk");
  indexStats.style.display = "none";
  loadingEl.style.display  = "block";
  listEl.innerHTML         = "";
  metaEl.style.display     = "none";
  emptyEl.style.display    = "none";
  paginEl.innerHTML        = "";

  try {
    const res  = await fetch(`${API}/search?q=${encodeURIComponent(query)}&page=${page}&limit=10`);
    const data = await res.json();
    loadingEl.style.display = "none";

    if (!data.results || data.results.length === 0) {
      emptyEl.style.display = "block"; return;
    }

    metaEl.innerHTML = `About <strong>${data.total.toLocaleString()}</strong> results &nbsp;·&nbsp; ${data.took_ms}ms`;
    metaEl.style.display = "block";

    listEl.innerHTML = data.results.map((r, i) => `
      <div class="result-card" style="animation-delay:${i * 40}ms">
        <div class="result-url">${r.url}</div>
        <div class="result-title"><a href="${r.url}" target="_blank" rel="noopener">${r.title}</a></div>
        <div class="result-snippet">${r.snippet}</div>
        <div class="result-meta">
          <span>score: ${r.score}</span>
          <span>coverage: ${(r.coverage * 100).toFixed(0)}%</span>
          <span>terms matched: ${r.term_hits}</span>
        </div>
      </div>
    `).join("");

    renderPagination(data.total, data.limit, page);

  } catch {
    loadingEl.style.display = "none";
    listEl.innerHTML = `<p style="color:var(--muted);padding:2rem 0">Could not reach API. Is server.js running?</p>`;
  }
}

function renderPagination(total, limit, current) {
  const totalPages = Math.ceil(total / limit);
  if (totalPages <= 1) return;
  const range = [];
  for (let p = Math.max(1, current - 2); p <= Math.min(totalPages, current + 2); p++) range.push(p);
  paginEl.innerHTML = range.map(p =>
    `<button class="page-btn ${p === current ? "active" : ""}" onclick="doSearch('${currentQuery}', ${p})">${p}</button>`
  ).join("");
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadStats();
indexStats.style.display = "block";
</script>
</body>
</html>
