<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniSearch</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="hero">

  <div class="logo">Mini<span>Search</span> </div>
  
  <div id="search-row">

    <div id="search-wrap">
      <input id="q" type="text" placeholder="Search the indexed web…" autocomplete="off" spellcheck="false" />

      <div id="suggest-box"></div>

      <button id="btn-search" aria-label="Search">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="8.5" cy="8.5" r="5.5"/><line x1="13" y1="13" x2="18" y2="18"/>
        </svg>
      </button>
      
    </div>

  </div>

  <div id="stats-bar"></div>

</div>

<div id="results-area">

  <div id="loading"><div class="spinner"></div></div>
  <div id="meta"></div>
  <div id="results-list"></div>
  <div id="empty">
    <div class="big">∅</div>
    <p>No results found. Try different keywords.</p>
  </div>
  <div id="pagination"></div>
  <div id="index-stats"></div>

</div>

<script src="script.js"></script>
</body>
</html>
